experiment:
  name: random_init_vit_base
paths:
  data: data/diving48
  checkpoint: null
  output: outputs/runs/random_init_vit_base
model:
  architecture: vit_base_patch16_224
  pretrained: false
  freeze_mode: full
  unfreeze_last_blocks: 4
training:
  seed: 42
  epochs: 50
  batch_size: auto
  learning_rate: 3.0e-4
  min_learning_rate: 1.0e-6
  warmup_learning_rate: 1.0e-8
  warmup_epochs: 5
  weight_decay: 0.05
  layer_decay: 0.8
  drop_path: 0.2
  clip_grad: 5.0
  num_frames: 16
  sampling_rate: 4
  repeated_samples: 1
  save_checkpoint_frequency: 1
evaluation:
  num_segments: 5
  num_crops: 3
logging:
  wandb_project: videomaev2-diving48
  wandb_run_name: random_init_vit_base
  wandb_mode: online
system:
  gpus: "0"
  num_workers: 8
